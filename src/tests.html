<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Tests — tutorial-moon v2</title>
  <style>
    body { font-family: monospace; background: #0a0a0f; color: #e4e4ed; padding: 2rem; max-width: 800px; }
    h1 { color: #8b5cf6; }
    .pass { color: #34d399; }
    .fail { color: #ef4444; }
    .summary { margin-top: 2rem; padding: 1rem; border-top: 1px solid #2a2a3e; }
    .acid-tag { color: #f59e0b; font-size: 0.8rem; }
    li { margin: 0.4rem 0; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>🧪 tutorial-moon v2 — ACID Test Suite</h1>
  <ol id="results"></ol>
  <div class="summary" id="summary"></div>

  <script src="config.js"></script>
  <script src="engine.js"></script>
  <script>
    const results = document.getElementById("results");
    const summary = document.getElementById("summary");
    let passed = 0, failed = 0, total = 0;

    function test(acid, description, fn) {
      total++;
      const li = document.createElement("li");
      try {
        fn();
        li.innerHTML = `<span class="pass">✓ PASS</span> <span class="acid-tag">[${acid}]</span> ${description}`;
        passed++;
      } catch (e) {
        li.innerHTML = `<span class="fail">✗ FAIL — ${e.message}</span> <span class="acid-tag">[${acid}]</span> ${description}`;
        failed++;
      }
      results.appendChild(li);
    }

    // ── CONFIG Tests ────────────────────────────────

    test("CONFIG.1", "Starting values match spec",
      () => {
        const r = CONFIG.DESTINATIONS.moon.startingResources;
        if (r.steel !== 10000) throw new Error(`steel: ${r.steel}`);
        if (r.aluminum !== 5000) throw new Error(`aluminum: ${r.aluminum}`);
        if (r.preciousMetals !== 1000) throw new Error(`PM: ${r.preciousMetals}`);
        if (r.water !== 8000) throw new Error(`water: ${r.water}`);
        if (r.hydrogen !== 3000) throw new Error(`hydrogen: ${r.hydrogen}`);
        if (r.nitrogen !== 2000) throw new Error(`nitrogen: ${r.nitrogen}`);
        if (r.food !== 6000) throw new Error(`food: ${r.food}`);
        if (r.energy !== 10000) throw new Error(`energy: ${r.energy}`);
        if (r.fuel !== 4000) throw new Error(`fuel: ${r.fuel}`);
      }
    );

    test("CONFIG.1", "Consumption rates use perCapita for food/water, flat for energy/fuel",
      () => {
        const c = CONFIG.DESTINATIONS.moon.consumptionPerSecond;
        if (c.water.type !== "perCapita" || c.water.rate !== 1) throw new Error("water config");
        if (c.food.type !== "perCapita" || c.food.rate !== 1) throw new Error("food config");
        if (c.energy.type !== "flat" || c.energy.rate !== 3) throw new Error("energy config");
        if (c.fuel.type !== "flat" || c.fuel.rate !== 1) throw new Error("fuel config");
      }
    );

    test("RESS.1", "Resource groups defined",
      () => {
        if (!CONFIG.RESOURCE_GROUPS.materials) throw new Error("No materials");
        if (!CONFIG.RESOURCE_GROUPS.volatiles) throw new Error("No volatiles");
        if (!CONFIG.RESOURCE_GROUPS.consumables) throw new Error("No consumables");
        if (!CONFIG.RESOURCE_GROUPS.power) throw new Error("No power");
      }
    );

    test("RESS.2", "Materials: Steel, Aluminum, Precious Metals",
      () => { const m = CONFIG.RESOURCE_GROUPS.materials.resources;
        ["steel","aluminum","preciousMetals"].forEach(r => { if (!m.includes(r)) throw new Error(`Missing ${r}`); }); }
    );
    test("RESS.3", "Volatiles: Water, Hydrogen, Nitrogen",
      () => { const v = CONFIG.RESOURCE_GROUPS.volatiles.resources;
        ["water","hydrogen","nitrogen"].forEach(r => { if (!v.includes(r)) throw new Error(`Missing ${r}`); }); }
    );
    test("RESS.4", "Consumables: Food only",
      () => { const c = CONFIG.RESOURCE_GROUPS.consumables.resources;
        if (c.length !== 1 || c[0] !== "food") throw new Error("consumables"); }
    );
    test("RESS.5", "Power: Energy, Fuel",
      () => { const p = CONFIG.RESOURCE_GROUPS.power.resources;
        ["energy","fuel"].forEach(r => { if (!p.includes(r)) throw new Error(`Missing ${r}`); }); }
    );

    // ── POPULATION ────────────────────────────────────

    test("POP.1", "Game state starts with 500 colonists",
      () => {
        const s = createGameState("moon");
        if (s.population !== 500) throw new Error(`Expected 500, got ${s.population}`);
      }
    );

    test("POP.3", "Food consumption = population * perCapita rate (500/s)",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        const before = s.resources.food;
        tick(s);
        if (s.resources.food !== before - 500) throw new Error(`Expected ${before - 500}, got ${s.resources.food}`);
      }
    );

    test("POP.3", "Water consumption = population * perCapita rate (500/s)",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        const before = s.resources.water;
        tick(s);
        if (s.resources.water !== before - 500) throw new Error(`Expected ${before - 500}, got ${s.resources.water}`);
      }
    );

    // ── CONSUMPTION ───────────────────────────────────

    test("RES.7", "Energy consumption flat -3/s",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        const before = s.resources.energy;
        tick(s);
        if (s.resources.energy !== before - 3) throw new Error(`Expected ${before - 3}, got ${s.resources.energy}`);
      }
    );

    test("RES.7", "Fuel consumption flat -1/s",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        const before = s.resources.fuel;
        tick(s);
        if (s.resources.fuel !== before - 1) throw new Error(`Expected ${before - 1}, got ${s.resources.fuel}`);
      }
    );

    test("RES.8", "Steel, Aluminum, Precious Metals, Hydrogen, Nitrogen unchanged",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        const before = { ...s.resources };
        for (let i = 0; i < 10; i++) tick(s);
        ["steel","aluminum","preciousMetals","hydrogen","nitrogen"].forEach(r => {
          if (s.resources[r] !== before[r]) throw new Error(`${r} changed from ${before[r]} to ${s.resources[r]}`);
        });
      }
    );

    test("RES.9", "Resources floor at zero, never negative",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        s.resources.food = 200; // 500/s consumption, should go to 0 in 1 tick
        tick(s);
        if (s.resources.food < 0) throw new Error(`Food went to ${s.resources.food}`);
        tick(s);
        if (s.resources.food < 0) throw new Error(`Food went to ${s.resources.food} after 2nd tick`);
      }
    );

    // ── ENGINE ──────────────────────────────────────

    test("ARCH.2", "createGameState returns complete state",
      () => {
        const s = createGameState("moon");
        ["resources","population","morale","buildings","statuses","phase","travelTimeRemaining",
         "destinationId","destinationName","flags","paused","tickCount"].forEach(f => {
          if (s[f] === undefined) throw new Error(`Missing field: ${f}`);
        });
      }
    );

    test("ARCH.3", "Engine has no DOM references",
      () => {
        const src = tick.toString() + createGameState.toString() + startTravel.toString()
                   + buildFarm.toString() + checkStatusTriggers.toString() + updateMorale.toString();
        if (src.includes("document.")) throw new Error("Engine references document");
        if (src.includes("innerHTML")) throw new Error("Engine references innerHTML");
      }
    );

    test("TRAVEL.1", "Moon destination has 60s travel time",
      () => {
        if (CONFIG.DESTINATIONS.moon.travelTime !== 60) throw new Error(`${CONFIG.DESTINATIONS.moon.travelTime}`);
      }
    );

    test("TRAVEL.3", "Timer decrements 1 per tick",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        s.flags.lowFoodPopupShown = true; // bypass pause from low-food event
        [60,59,58].forEach((expected, i) => {
          if (i > 0) tick(s);
          if (s.travelTimeRemaining !== expected) throw new Error(`Tick ${i}: expected ${expected}, got ${s.travelTimeRemaining}`);
        });
      }
    );

    test("TRAVEL.5", "Phase transitions to complete at timer 0",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        s.travelTimeRemaining = 1;
        tick(s);
        if (s.phase !== "complete") throw new Error(`Expected complete, got ${s.phase}`);
      }
    );

    // ── MORALE ──────────────────────────────────────

    test("MORALE.1", "Morale starts at 100, capped at -100 to 100",
      () => {
        const s = createGameState("moon");
        if (s.morale !== 100) throw new Error(`Expected 100, got ${s.morale}`);
        if (CONFIG.MORALE.max !== 100) throw new Error(`Max config: ${CONFIG.MORALE.max}`);
        if (CONFIG.MORALE.min !== -100) throw new Error(`Min config: ${CONFIG.MORALE.min}`);
      }
    );

    test("MORALE.3", "Morale decays by 1 every 10 ticks when food will run out and past halfway",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        s.flags.lowFoodPopupShown = true; // bypass pause from low-food event
        // Advance to tick 31 (over halfway at 60s trip)
        for (let i = 0; i < 35; i++) tick(s);
        // By now food is long gone, should be past halfway
        if (s.travelTimeRemaining <= 30) {
          // Check if morale has started decaying
          const ticksPastHalfway = 35 - Math.ceil(60 * CONFIG.MORALE.halfWayFraction);
          const expectedDecaySteps = Math.floor(ticksPastHalfway / CONFIG.MORALE.decayIntervalTicks);
          const expectedMorale = CONFIG.MORALE.initial - expectedDecaySteps * CONFIG.MORALE.decayAmount;
          if (s.morale !== expectedMorale) {
            throw new Error(`Expected morale ~${expectedMorale}, got ${s.morale} after ${35} ticks`);
          }
        }
      }
    );

    test("MORALE.4", "Status tracks hostile populace when morale below 0",
      () => {
        const s = createGameState("moon");
        s.morale = -1;
        // Force a status check by running tick
        startTravel(s);
        s.travelTimeRemaining = 1;
        // Clear existing flags
        s.flags.lowFoodPopupShown = true;
        tick(s);
        const hostile = s.statuses.find(st => st.id === "hostile-populace");
        if (!hostile) throw new Error("Missing hostile-populace status");
      }
    );

    // ── STATUS ──────────────────────────────────────

    test("STATUS.1", "Low food status triggers during first voyage",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        tick(s); // 1 tick, food drops from 6000 to 5500
        const lowFood = s.statuses.find(st => st.id === "low-food");
        if (!lowFood) throw new Error("Low food status not triggered");
        if (!s.paused) throw new Error("Game should be paused");
        if (lowFood.type !== "critical") throw new Error(`Expected critical, got ${lowFood.type}`);
      }
    );

    test("STATUS.2", "Low food popup has correct message",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        tick(s);
        const lowFood = s.statuses.find(st => st.id === "low-food");
        if (!lowFood.title || !lowFood.message) throw new Error("Missing title/message");
        if (!lowFood.message.includes("farm")) throw new Error("Message should mention farm");
      }
    );

    test("STATUS.4", "Paused game does not advance travel timer",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        tick(s);
        const timeAfterPause = s.travelTimeRemaining;
        // Game should be paused after low food trigger
        if (!s.paused) throw new Error("Game not paused");
        tick(s);
        if (s.travelTimeRemaining !== timeAfterPause) throw new Error("Timer advanced while paused");
      }
    );

    test("STATUS.5", "Building farm dismisses popup and unpauses",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        tick(s); // triggers low food
        if (!s.paused) throw new Error("Should be paused");
        s.resources.steel = 10000; // ensure enough resources
        s.resources.aluminum = 5000;
        const result = buildFarm(s);
        if (!result.success) throw new Error(`Build failed: ${result.error}`);
        if (s.paused) throw new Error("Game should be unpaused after building farm");
        if (s.statuses.find(st => st.id === "low-food")) throw new Error("Low-food status should be removed");
      }
    );

    // ── BUILD ───────────────────────────────────────

    test("BUILD.2", "Farm building exists with proper config",
      () => {
        const farm = CONFIG.BUILDINGS.farm;
        if (!farm) throw new Error("No farm config");
        if (typeof farm.cost !== "object") throw new Error("No cost");
        if (typeof farm.inputsPerTick !== "object") throw new Error("No inputs");
        if (typeof farm.foodPerTick !== "number") throw new Error("No foodPerTick");
      }
    );

    test("BUILD.3", "Farm costs Steel and Aluminum",
      () => {
        const cost = CONFIG.BUILDINGS.farm.cost;
        if (!cost.steel) throw new Error("Missing steel cost");
        if (!cost.aluminum) throw new Error("Missing aluminum cost");
        if (cost.steel !== 500) throw new Error(`Steel cost: ${cost.steel}`);
        if (cost.aluminum !== 200) throw new Error(`Aluminum cost: ${cost.aluminum}`);
      }
    );

    test("BUILD.4", "Farm consumes Nitrogen, Energy, Water per tick",
      () => {
        const inputs = CONFIG.BUILDINGS.farm.inputsPerTick;
        if (!inputs.nitrogen) throw new Error("Missing nitrogen input");
        if (!inputs.energy) throw new Error("Missing energy input");
        if (!inputs.water) throw new Error("Missing water input");
      }
    );

    test("BUILD.5", "Farm produces food per tick",
      () => {
        const s = createGameState("moon");
        startTravel(s);
        s.resources.steel = 10000;
        s.resources.aluminum = 5000;
        s.flags.lowFoodPopupShown = true; // bypass popup
        buildFarm(s);
        const foodBefore = s.resources.food;
        tick(s);
        // Farm produces 250 food, but population consumes 500 food
        // Net: food should decrease by 250 instead of 500
        if (s.resources.food !== foodBefore - 250) throw new Error(`Expected ${foodBefore - 250}, got ${s.resources.food}`);
      }
    );

    test("BUILD.6", "Buildings tracked in game state",
      () => {
        const s = createGameState("moon");
        s.resources.steel = 10000;
        s.resources.aluminum = 5000;
        s.flags.lowFoodPopupShown = true;
        if (s.buildings.farm !== 0) throw new Error(`Expected 0 farms initially, got ${s.buildings.farm}`);
        buildFarm(s);
        if (s.buildings.farm !== 1) throw new Error(`Expected 1 farm, got ${s.buildings.farm}`);
      }
    );

    test("BUILD.3", "Farm build fails with insufficient resources",
      () => {
        const s = createGameState("moon");
        s.resources.steel = 0;
        const result = buildFarm(s);
        if (result.success) throw new Error("Build should have failed");
        if (!result.error) throw new Error("Should have error message");
      }
    );

    // ── ARCHITECTURE ────────────────────────────────

    test("ARCH.4", "Engine uses CONFIG values, not hardcoded numbers",
      () => {
        const src = tick.toString() + createGameState.toString() + buildFarm.toString();
        if (!src.includes("CONFIG.DESTINATIONS")) throw new Error("No CONFIG reference");
        if (!src.includes("CONFIG.MORALE")) throw new Error("No MORALE config reference");
        if (!src.includes("CONFIG.BUILDINGS")) throw new Error("No BUILDINGS config reference");
      }
    );

    test("CONFIG.5", "Engine supports any destination from config",
      () => {
        const td = {
          id: "test", name: "Test", description: "", travelTime: 10,
          startingResources: { steel: 100, aluminum: 50, preciousMetals: 10, water: 80, hydrogen: 30, nitrogen: 20, food: 60, energy: 100, fuel: 40 },
          startingPopulation: 10,
          consumptionPerSecond: { food: { type: "perCapita", rate: 1 }, water: { type: "perCapita", rate: 1 }, energy: { type: "flat", rate: 1 }, fuel: { type: "flat", rate: 1 } },
        };
        CONFIG.DESTINATIONS.test = td;
        const s = createGameState("test");
        startTravel(s);
        s.flags.lowFoodPopupShown = true; // bypass popup for engine test
        for (let i = 0; i < 5; i++) tick(s);
        if (s.destinationId !== "test") throw new Error("Override failed");
        if (s.resources.food !== 10) throw new Error(`Expected food 10, got ${s.resources.food}`); // 60 - 10*5 = 10
        if (s.population !== 10) throw new Error(`Expected pop 10, got ${s.population}`);
        delete CONFIG.DESTINATIONS.test;
      }
    );

    // ── Summary ──────────────────────────────────────
    summary.innerHTML = `
      <strong>Result:</strong>
      <span class="pass">${passed} passed</span> /
      <span class="fail">${failed} failed</span> /
      ${total} total
      ${failed === 0 ? "🎉 All ACIDs validated!" : "❌ Some tests failed"}
    `;
  </script>
</body>
</html>
