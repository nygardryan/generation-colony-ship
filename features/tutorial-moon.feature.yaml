feature:
  name: tutorial-moon
  product: generation-colony-ship
  draft: false

description: >
  Humanity's first colonization mission. The player manages a colony
  ship's resources during a 60-second voyage from Earth to the Moon.
  Introduces population, morale, status events, and construction systems
  as the tutorial vertical slice.

components:
  INTRO:
    description: Introduction and game setup
    requirements:
      1: >
        Shows an introduction screen explaining the player controls a
        colony ship carrying humanity into space
      2: >
        Provides a "Begin" action to advance to destination selection

  DEST:
    description: Destination selection
    requirements:
      1: >
        Presents a destination selection screen after the introduction
      2: >
        Displays The Moon as the only available destination
      3: >
        Selecting The Moon begins the voyage

  TRAVEL:
    description: Voyage travel mechanics
    requirements:
      1: >
        The voyage lasts approximately 60 seconds
      2: >
        Resources decrease in real time during travel
      3: >
        Displays remaining travel time counting down from 60 seconds
      4: >
        Displays the current destination during travel
      5: >
        When the voyage timer reaches zero, transitions to completion

  RES:
    description: Resources and consumption
    requirements:
      1: >
        Resources displayed in groups: Materials, Volatiles,
        Consumables, Power
      2: >
        Materials: Steel, Aluminum, Precious Metals
      3: >
        Volatiles: Water, Hydrogen, Nitrogen
      4: >
        Consumables: Food
      5: >
        Power: Energy, Fuel
      6: >
        Starting values: Steel 10000, Aluminum 5000, Precious Metals
        1000, Water 8000, Hydrogen 3000, Nitrogen 2000, Food 6000,
        Energy 10000, Fuel 4000
      7: >
        Food and Water consumption scale with population. Each colonist
        consumes 1 Food and 1 Water per tick. Energy decreases by 3
        per tick. Fuel decreases by 1 per tick. All other resources
        unchanged during the tutorial voyage.
      8: >
        Resources can never go below zero
      9: >
        Resource values update in real time during travel

  POP:
    description: Population system
    requirements:
      1: >
        The colony ship starts with 500 colonists
      2: >
        Population is displayed in a dedicated Population tab
      3: >
        Food and Water consumption is calculated as population
        multiplied by per-capita rate

  MORALE:
    description: Morale system
    requirements:
      1: >
        Morale is a tracked value with a cap of 100 and a floor of -100
      2: >
        Morale starts at 100
      3: >
        When the ship is over halfway to destination AND calculated food
        will run out before arrival, morale decreases by 1 every 10 ticks
      4: >
        Morale below 0 indicates a hostile population

  STATUS:
    description: Status conditions and tutorial events
    requirements:
      1: >
        The game detects when food supply is critically low during the
        first voyage
      2: >
        When the low-food status first triggers, the game pauses with
        a popup explaining Earth did not send enough supplies
      3: >
        The popup instructs the player to build a farm using the
        Build tab
      4: >
        While paused, the travel timer does not advance
      5: >
        The player can close the popup and continue after building
        the farm

  BUILD:
    description: Construction and building system
    requirements:
      1: >
        A Build tab is available with construction options
      2: >
        A Farm building can be constructed
      3: >
        The Farm costs Steel and Aluminum to build
      4: >
        Once built, the Farm consumes Nitrogen, Energy, and Water
      5: >
        The Farm produces Food each tick
      6: >
        Buildings are tracked in the game state and persist for the
        duration of the voyage

  UI:
    description: User interface tabs
    requirements:
      1: >
        The travel screen has tab navigation for different panels:
        Resources, Population, Status, Systems, Build
      2: >
        The Resources tab shows resource groups (default view)
      3: >
        The Population tab shows colonist count and morale
      4: >
        The Status tab shows active conditions and events
      5: >
        The Systems tab shows ship systems overview
      6: >
        The Build tab shows available constructions

  COMPLETE:
    description: Mission completion
    requirements:
      1: >
        Displays a success screen when the Moon voyage completes
      2: >
        Indicates that a Moon colony has been established

constraints:
  ARCH:
    description: Architecture and code structure
    requirements:
      1: >
        Codebase structured for long-term expansion into galaxy-spanning
        colony management simulation
      2: >
        Central game state object with all gameplay values
      3: >
        Simulation logic separated from UI/rendering
      4: >
        All values stored as configurable constants
      5: >
        Supports adding destinations without refactoring core

  EXT:
    description: Extension points
    requirements:
      1: >
        Extension points for: Occupations, Political Points, Colonies,
        Research, Random events, Edicts
      2: >
        Core gameplay loop does not require refactoring for new features